<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Three.js (r128) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- OrbitControls -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #000; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none; 
        }
        #canvas-container { 
            width: 100vw; 
            height: 100vh; 
            position: absolute; 
            top: 0; 
            left: 0; 
            z-index: 1; 
        }
        
		.cinematic-ui {
				position: absolute;
				z-index: 10;
				top: 0;
				left: 0;
				pointer-events: none; 
				color: rgba(255, 255, 255, 0.85);
				text-shadow: 0 0 15px rgba(255, 200, 100, 0.3);
				width: 100%;
				height: 100%;
				/* 改为底部对齐布局 */
				display: flex;
				flex-direction: column;
				justify-content: flex-end; 
				padding: 40px;
				box-sizing: border-box;
				background: radial-gradient(circle at center, transparent 30%, #000000 130%);
			}

        /* --- Drawer UI Styling (Fixed) --- */
		.ui-drawer {
				display: flex;
				align-items: flex-end; 
				position: absolute;
				bottom: 120px; /* 抬高一点，防止挡住最底下的文字 */
				left: 0;
				transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
				pointer-events: auto;
				z-index: 50;
			}

        .ui-drawer.closed {
            transform: translateX(calc(-100% + 40px));
        }

        .ui-content-wrapper {
            background: rgba(10, 10, 10, 0.7);
            backdrop-filter: blur(10px);
            padding: 20px 20px 20px 30px; 
            border-radius: 0 2px 2px 0;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-left: none;
            width: 320px; 
        }

        .ui-toggle-arrow {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.6);
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-left: none;
            backdrop-filter: blur(5px);
            cursor: pointer;
            border-radius: 0 4px 4px 0;
            transition: background 0.3s;
            touch-action: none; 
        }
        .ui-toggle-arrow:active, .ui-toggle-arrow:hover {
            background: rgba(50, 50, 50, 1.0);
            color: #fff;
        }
        
        .ui-drawer.closed .ui-toggle-arrow > span {
            transform: rotate(180deg);
        }
        .ui-toggle-arrow > span {
            display: block;
            transition: transform 0.3s;
        }

        .title {
            font-size: 12px;
            letter-spacing: 0.3em;
            font-weight: 600;
            border-left: 2px solid rgba(255, 255, 255, 0.5);
            padding-left: 10px;
            margin-bottom: 15px;
        }

        .control-group { margin-bottom: 20px; }
        .control-label { 
            font-size: 9px; 
            letter-spacing: 0.15em; 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 8px; 
            color: #ccc; 
            text-transform: uppercase;
        }
        
        input[type=range] {
            -webkit-appearance: none; width: 100%; background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 14px; width: 14px;
            border-radius: 50%; background: #ffffff;
            cursor: pointer; box-shadow: 0 0 10px rgba(255,255,255,0.8); margin-top: -6px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 2px; cursor: pointer; background: rgba(255,255,255,0.2);
        }

        /* Action Buttons */
        .action-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 16px; 
            font-size: 10px;
            letter-spacing: 0.2em;
            cursor: pointer;
            transition: all 0.1s;
            text-transform: uppercase;
            margin-right: 10px;
            margin-top: 10px;
            touch-action: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .action-btn:active { transform: scale(0.95); background: rgba(255, 255, 255, 0.3); }
        
        .btn-danger { border-color: rgba(255, 100, 100, 0.5); color: #ffcccc; }
        .btn-danger:active { background: rgba(200, 50, 50, 0.6); box-shadow: 0 0 15px rgba(255, 0, 0, 0.5); }

        /* Switch Style */
        .switch-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #888;
            width: 100%;
            padding: 8px;
            font-size: 10px;
            letter-spacing: 0.15em;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .switch-btn.active {
            background: rgba(255, 255, 255, 0.3);
            color: #fff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
            border-color: #fff;
        }

        .status-line { font-size: 9px; font-family: 'Courier New', monospace; opacity: 0.7; margin-top: 4px; }
        .blink { animation: blinker 0.2s linear infinite; color: #ff3333; font-weight: bold; }
        @keyframes blinker { 50% { opacity: 0.3; } }

        .hint-text {
            font-size: 9px;
            letter-spacing: 0.2em;
            opacity: 0.5;
            text-transform: uppercase;
            line-height: 1.6;
        }
        
        #freeze-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 16px; letter-spacing: 0.8em; color: #fff; opacity: 0;
            transition: opacity 0.3s; pointer-events: none;
            border-top: 1px solid white; border-bottom: 1px solid white; 
            padding: 15px 0; text-shadow: 0 0 20px white;
            z-index: 20;
        }

        #charge-bar-container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 240px; height: 2px; background: rgba(255,255,255,0.1);
            overflow: hidden; opacity: 0; transition: opacity 0.2s;
            pointer-events: none;
            z-index: 15;
        }
        #charge-bar {
            width: 0%; height: 100%; background: #fff; box-shadow: 0 0 15px #ffffff;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    <div id="freeze-overlay">SIMULATION PAUSED</div>

    <div class="cinematic-ui">
        <!-- Reorganized Top Left as Sliding Drawer -->
        <div class="ui-drawer" id="ui-drawer">
            <!-- Content Wrapper -->
            <div class="ui-content-wrapper">
                <div class="title">EVENT HORIZON TELESCOPE</div>
                <div class="control-group">
                    <div class="control-label">
                        <span>Singularity Mass</span>
                        <span id="mass-display">1.0 M☉</span>
                    </div>
                    <input type="range" id="mass-slider" min="1" max="5" step="0.01" value="1.0">
                </div>

                <div class="control-group">
                    <div class="control-label">
                        <span>Temporal Flow</span>
                        <span id="speed-display">1.0x</span>
                    </div>
                    <input type="range" id="speed-slider" min="0.0" max="4.0" step="0.1" value="1.0">
                </div>

                <!-- Lensing Toggle (Default ON) -->
                <div class="control-group" style="margin-bottom: 0;">
                    <div class="control-label">
                        <span>Visual Distortion</span>
                        <span id="lensing-display" style="color: #fff;">ON</span>
                    </div>
                    <!-- Added 'active' class by default, changed text to DISABLE -->
                    <button id="lensing-toggle" class="switch-btn active">DISABLE LENSING</button>
                </div>
                
                <!-- Explicit Controls -->
                <div class="flex mt-4 pt-2 border-t border-white/10">
                    <button id="btn-freeze" class="action-btn">FREEZE</button>
                    <button id="btn-breach" class="action-btn btn-danger">BREACH</button>
                </div>

                <div class="mt-3 pt-3 border-t border-white/10">
                    <div class="status-line text-green-400" id="status-text">SYSTEM STABLE</div>
                    <div class="status-line">GYRO SENSOR: <span id="gyro-status">SEARCHING...</span></div>
                </div>
            </div>
            
            <!-- Toggle Arrow -->
            <div class="ui-toggle-arrow" id="ui-toggle-btn">
                <span>◀</span>
            </div>
        </div>
        
        <div class="flex justify-between items-end">
            <div class="hint-text text-left"></div>
            <div class="text-right hint-text">
                MATTER COUNT: 300,000<br>
                PHYSICS: GRAV-REDSHIFT & ISCO PLUNGE
            </div>
        </div>
    </div>

    <!-- SHADER: CORRECTED RELATIVISTIC VISUALIZATION -->
	<script type="x-shader/x-vertex" id="disk-vs">
		uniform float massScale;
		uniform float lensingStrength; 

		attribute float size;
		attribute float alpha;
		attribute vec3 customColor;
		varying vec3 vColor;
		varying float vAlpha;

		void main() {
			vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
			float rPhys = length(position.xyz);
			float rsPhys = massScale * 3.0; // 視界半徑

			// 1. 強化引力紅移 (視覺補償)
			// 在正上方，多普勒效應很弱，所以必須依賴引力紅移的顏色變化
			float gFactor = sqrt(clamp(1.0 - rsPhys / (rPhys + 0.001), 0.0, 1.0));
			
			// 2. 顏色邏輯：從正常的橙色 -> 明亮的白熱 -> 深沉的血紅
			vec3 normalColor = customColor;
			vec3 hotEdge = vec3(1.0, 0.9, 0.6);   // 接近視界時因壓縮而發白
			vec3 bloodRed = vec3(0.5, 0.01, 0.0); // 最終紅移色
			
			// 使用 smoothstep 製造更劇烈的顏色階梯
			vec3 colorMix = mix(bloodRed, normalColor, smoothstep(0.0, 0.2, gFactor));
			// 在 1.05Rs 到 1.2Rs 之間製造一個「光環」效果
			colorMix = mix(hotEdge, colorMix, smoothstep(0.0, 0.1, gFactor - 0.05));

			// 3. 多普勒集束 (在俯視時依然保留)
			vec3 velDir = normalize(vec3(-position.z, 0.0, position.x));
			vec3 velView = normalize(normalMatrix * velDir);
			vec3 viewDir = normalize(-mvPosition.xyz);
			float beaming = pow(1.0 + 0.5 * dot(velView, viewDir), 3.0);

			vColor = colorMix * beaming * (gFactor + 0.1); 
			vAlpha = alpha;

			// 4. 透鏡扭曲
			if (lensingStrength > 0.01) {
				float r = length(mvPosition.xy);
				float rs = massScale * 12.0; 
				float b = max(r, 0.1);
				float deflection = (2.0 * rs / b) + (15.0 * rs * rs / (b * b));
				mvPosition.xy += normalize(mvPosition.xy) * deflection * lensingStrength;
			}

			gl_Position = projectionMatrix * mvPosition;
			// 增大粒子在視界附近的視覺尺寸，增加「粘稠感」
			float sizeBoost = 1.0 + (1.0 - gFactor) * 2.0;
			gl_PointSize = size * sizeBoost * (0.3 + massScale * 0.4) * (900.0 / -mvPosition.z);
		}
	</script>

    <script type="x-shader/x-fragment" id="disk-fs">
        varying vec3 vColor;
        varying float vAlpha;
        
        void main() {
            vec2 center = gl_PointCoord - 0.5;
            float dist = length(center);
            if (dist > 0.5) discard;
            
            float strength = 1.0 - (dist * 2.0);
            strength = pow(strength, 2.5);

            gl_FragColor = vec4(vColor, vAlpha * strength);
        }
    </script>

<script>
/**
 * GARGANTUA: EINSTEIN LENSING V24 (Lensing Default ON)
 * - Changed default lensing state to ON.
 * - Physics: ISCO Plunge + Gravitational Time Dilation.
 * - Base Speed: 0.4
 */

const CONFIG = {
    particleCount: 300000,
    horizonRadius: 2.0,      // 史瓦西半径 Rs = 2
    iscoRadius: 6.0,         // 最内稳定轨道 ISCO = 3 * Rs
    photonSphere: 3.0,       // 光子球 = 1.5 * Rs
    diskInner: 6.0,          // 盘从 ISCO 开始
    diskOuterBase: 40.0,
    spawnZoneBase: 20.0,
    baseSpeed: 0.4,
    alphaViscosity: 0.1,     // 粘滞系数 alpha
    aspectRatio: 0.05,       // 盘厚度比 H/R
    colAccretion: new THREE.Color(0xffaa33),
};

let scene, camera, renderer;
let system, blackHole, universeGroup;
let controls, clock;

let state = {
    mass: 1.0,  
    prevMass: 1.0,          
    simSpeed: 1.0,
    lensingTarget: 1.0, // DEFAULT ON
    lensingCurrent: 1.0, // DEFAULT ON
    isFrozen: false,
    isExploding: false,
    explosionFactor: 0.0,
    chargeLevel: 0.0,
    isCharging: false,
    gyro: { x: 0, y: 0 }
};

let chargeInterval = null;

// SSD盘发射率分布: ε(r) ∝ r^-3 * (1 - sqrt(isco/r))
// SSD盘发射率：决定了从边缘到中心的亮度梯度
function getEmissivity(r, isco) {
    if (r < isco) return 0;
    const term = 1.0 - Math.sqrt(isco / r);
    // 基础强度随质量调节，保持 Mass=5 时不暗
    const intensity = 450.0 * (1.0 + state.mass * 0.4); 
    return term * Math.pow(isco / r, 3.0) * intensity;
}

// 物理径向速度 (粘滞吸积)
function getRadialVelocity(r, rs, mass) {
    const v_phi = Math.sqrt((500.0 * mass) / r); // 开普勒速度
    const alpha = CONFIG.alphaViscosity;
    const h_r = CONFIG.aspectRatio;
    return -alpha * (h_r * h_r) * v_phi;
}

function init() {
    const container = document.getElementById('canvas-container');

    scene = new THREE.Scene();
    universeGroup = new THREE.Group();
    scene.add(universeGroup);
    
    // Adjusted camera slightly to look down more, enhancing the spiral view
    camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 60, 200);

    renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x000000);
    container.appendChild(renderer.domElement);

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.rotateSpeed = 0.3;
    controls.enablePan = false;
    controls.minDistance = 10;
    controls.maxDistance = 800;

    createBlackHoleCore();
    createUnifiedSystem(); 

    window.addEventListener('resize', onWindowResize);
    setupInteractions();
    setupGyroscope();

    clock = new THREE.Clock();
    animate();
}

function createBlackHoleCore() {
    const geo = new THREE.SphereGeometry(2.95, 64, 64);
    const mat = new THREE.MeshBasicMaterial({ color: 0x000000 });
    blackHole = new THREE.Mesh(geo, mat);
    universeGroup.add(blackHole);
}
function createUnifiedSystem() {
    const positions = [];
    const colors = [];
    const sizes = [];
    const alphas = [];
    const phases = [];      
    const radii = [];        
    const yOffsets = [];     
    const speeds = [];       
    const originalY = [];    
    const targetAlpha = []; 
    const randomSeed = [];  
    const infallMod = [];    

    for (let i = 0; i < CONFIG.particleCount; i++) {
        // 初始半径设为 5000 确保开场看不见，等待 animate 触发重生
        const initR = 5000.0; 
        const angle = Math.random() * Math.PI * 2;
        
        radii.push(initR);
        phases.push(angle);
        positions.push(0, 0, 0); 
        colors.push(CONFIG.colAccretion.r, CONFIG.colAccretion.g, CONFIG.colAccretion.b); 
        sizes.push(Math.random() * 0.5 + 0.5); 
        alphas.push(0.0);
        targetAlpha.push(0.0); 

        const spread = (Math.random() - 0.5) * 2.0; 
        yOffsets.push(spread);
        originalY.push(spread);
        speeds.push(Math.random() * 0.2 + 0.9);
        randomSeed.push(Math.random());
        infallMod.push(0.8 + Math.random() * 0.4);
    }

    const geometry = new THREE.BufferGeometry();
    geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    geometry.setAttribute('customColor', new THREE.Float32BufferAttribute(colors, 3));
    geometry.setAttribute('size', new THREE.Float32BufferAttribute(sizes, 1));
    geometry.setAttribute('alpha', new THREE.Float32BufferAttribute(alphas, 1));

    geometry.userData = { phases, radii, yOffsets, speeds, originalY, targetAlpha, randomSeed, infallMod };

    const material = new THREE.ShaderMaterial({
        uniforms: {
            massScale: { value: 1.0 },
            lensingStrength: { value: 1.0 } 
        },
        vertexShader: document.getElementById('disk-vs').textContent,
        fragmentShader: document.getElementById('disk-fs').textContent,
        blending: THREE.AdditiveBlending,
        depthWrite: false, 
        transparent: true
    });

    system = new THREE.Points(geometry, material);
    universeGroup.add(system);
}

function setupGyroscope() {
    if (window.DeviceOrientationEvent && typeof window.DeviceOrientationEvent.requestPermission === 'function') {
        document.getElementById('gyro-status').innerText = "TAP TO ENABLE";
    }
    window.addEventListener('deviceorientation', (e) => {
        if (!e.beta && !e.gamma) return;
        const x = Math.max(-30, Math.min(30, e.beta || 0)); 
        const y = Math.max(-30, Math.min(30, e.gamma || 0)); 
        state.gyro.x = x * 0.02; 
        state.gyro.y = y * 0.02; 
        document.getElementById('gyro-status').innerText = "ACTIVE";
        document.getElementById('gyro-status').style.color = "#44ff44";
    });
}

function setupInteractions() {
    const canvas = renderer.domElement;
    
    // --- 1. DRAWER LOGIC ---
    const uiDrawer = document.getElementById('ui-drawer');
    const uiToggleBtn = document.getElementById('ui-toggle-btn');
    
    uiToggleBtn.addEventListener('click', (e) => {
        e.preventDefault(); e.stopPropagation();
        uiDrawer.classList.toggle('closed');
    });
    uiToggleBtn.addEventListener('touchend', (e) => {
        e.preventDefault(); e.stopPropagation();
        uiDrawer.classList.toggle('closed');
    });

    // --- 2. CONTROLS ---
    const massSlider = document.getElementById('mass-slider');
    const massDisplay = document.getElementById('mass-display');
    massSlider.addEventListener('input', (e) => {
        state.mass = parseFloat(e.target.value);
        massDisplay.innerText = state.mass.toFixed(2) + " M☉";
    });

    const speedSlider = document.getElementById('speed-slider');
    const speedDisplay = document.getElementById('speed-display');
    speedSlider.addEventListener('input', (e) => {
        state.simSpeed = parseFloat(e.target.value);
        speedDisplay.innerText = state.simSpeed.toFixed(1) + "x";
    });

    // --- LENSING TOGGLE (Logic Update for Default ON) ---
	const lensingToggle = document.getElementById('lensing-toggle');
	const lensingDisplay = document.getElementById('lensing-display');

	lensingToggle.addEventListener('click', (e) => {
		e.stopPropagation();
		if (state.lensingTarget > 0.5) {
			state.lensingTarget = 0.0;
			lensingToggle.innerText = "ENABLE LENSING";
			lensingToggle.classList.remove('active');
			lensingDisplay.innerText = "OFF";
			lensingDisplay.style.color = "#888";
		} else {
			state.lensingTarget = 1.0;
			lensingToggle.innerText = "DISABLE LENSING";
			lensingToggle.classList.add('active');
			lensingDisplay.innerText = "ON";
			lensingDisplay.style.color = "#fff";
		}
	});

    // --- 3. FREEZE BUTTON ---
    const btnFreeze = document.getElementById('btn-freeze');
    const freezeOverlay = document.getElementById('freeze-overlay');
    
    const toggleFreeze = () => {
        state.isFrozen = !state.isFrozen;
        freezeOverlay.style.opacity = state.isFrozen ? '1' : '0';
        btnFreeze.innerText = state.isFrozen ? "RESUME" : "FREEZE";
        btnFreeze.style.background = state.isFrozen ? "rgba(255, 255, 255, 0.4)" : "";
        if (navigator.vibrate) navigator.vibrate(20);
    };

    btnFreeze.addEventListener('click', (e) => { e.stopPropagation(); toggleFreeze(); });
    btnFreeze.addEventListener('dblclick', (e) => { e.stopPropagation(); });

    // --- 4. BREACH BUTTON ---
    const btnBreach = document.getElementById('btn-breach');
    const statusText = document.getElementById('status-text');

    const triggerExplosion = () => {
        if(state.isExploding) return;
        state.isExploding = true;
        statusText.innerText = "EVENT HORIZON BREACH";
        statusText.classList.remove('text-green-400');
        statusText.classList.add('blink');
        if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
    };

    const stopExplosion = () => {
        if (!state.isExploding) return;
        state.isExploding = false;
        statusText.innerText = "RESTORING ORBIT";
        statusText.classList.remove('blink');
        statusText.classList.add('text-yellow-400');
        setTimeout(() => {
            if(!state.isExploding) {
                 statusText.innerText = "SYSTEM STABLE";
                 statusText.classList.remove('text-yellow-400');
                 statusText.classList.add('text-green-400');
            }
        }, 2000);
        
        window.removeEventListener('mouseup', stopExplosion, true);
        window.removeEventListener('touchend', stopExplosion, true);
        window.removeEventListener('touchcancel', stopExplosion, true);
    };

    const onBreachStart = (e) => {
        e.preventDefault(); e.stopPropagation();
        triggerExplosion();
        window.addEventListener('mouseup', stopExplosion, true);
        window.addEventListener('touchend', stopExplosion, true);
        window.addEventListener('touchcancel', stopExplosion, true);
    };

    btnBreach.addEventListener('mousedown', onBreachStart);
    btnBreach.addEventListener('touchstart', onBreachStart, { passive: false });

    // --- 5. CANVAS INTERACTIONS ---
    let lastTapTime = 0;
    let touchStartX = 0;
    let touchStartY = 0;
    let isDragging = false;
    let lastTouchTime = 0; 
    
    const chargeBar = document.getElementById('charge-bar');
    const chargeBarContainer = document.getElementById('charge-bar-container');
    
    const startCanvasCharge = () => {
        if (state.isExploding) return;
        state.isCharging = true;
        state.chargeLevel = 0;
        chargeBarContainer.style.opacity = '1';
        
        if (chargeInterval) clearInterval(chargeInterval);
        chargeInterval = setInterval(() => {
            if (!state.isCharging) return;
            state.chargeLevel += 0.02; 
            chargeBar.style.width = Math.min(100, state.chargeLevel * 100) + "%";
            if (state.chargeLevel >= 1.0) {
                triggerExplosion();
                clearInterval(chargeInterval);
            }
        }, 20);
    };

    const stopCanvasCharge = () => {
        state.isCharging = false;
        clearInterval(chargeInterval);
        chargeBarContainer.style.opacity = '0';
        state.chargeLevel = 0;
        chargeBar.style.width = "0%";
        if (state.isExploding) stopExplosion(); 
    };

    canvas.addEventListener('touchstart', (e) => {
        if (e.touches.length > 1) return;
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
        isDragging = false;
        startCanvasCharge();
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
        const dx = e.touches[0].clientX - touchStartX;
        const dy = e.touches[0].clientY - touchStartY;
        if (Math.sqrt(dx*dx + dy*dy) > 30) isDragging = true;
    }, { passive: false });

    canvas.addEventListener('touchend', (e) => {
        lastTouchTime = new Date().getTime();
        stopCanvasCharge();
        if (isDragging) return;

        const currentTime = new Date().getTime();
        const tapLength = currentTime - lastTapTime;
        if (tapLength < 500 && tapLength > 0) {
            toggleFreeze();
            if(e.cancelable) e.preventDefault(); 
        } 
        lastTapTime = currentTime;
    });

    canvas.addEventListener('mousedown', startCanvasCharge);
    canvas.addEventListener('dblclick', (e) => {
        const now = new Date().getTime();
        if (now - lastTouchTime < 800) return;
        toggleFreeze();
    });
    window.addEventListener('mouseup', stopCanvasCharge);
}

let globalSpawnCount = 0;

function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();
    controls.update();

    // 处理陀螺仪交互
    if (universeGroup) {
        universeGroup.rotation.x += (state.gyro.x - universeGroup.rotation.x) * 0.1;
        universeGroup.rotation.y += (state.gyro.y - universeGroup.rotation.y) * 0.1;
    }

    // 基础模拟步长
    let simDelta = (state.isFrozen ? 0 : delta) * state.simSpeed;
    
    // 爆发（Breach）因子处理
    if (state.isExploding) {
        state.explosionFactor += (1.0 - state.explosionFactor) * 0.05;
        // 爆发时强制保持时间流向，不受冻结影响
        simDelta = delta * state.simSpeed; 
    } else {
        state.explosionFactor += (0.0 - state.explosionFactor) * 0.08;
    }

    // --- 1. 物理环境常量计算 ---
    const currentRs = CONFIG.horizonRadius * state.mass; // 史瓦西半径 (通常为 3.0 * Mass)
    const isco = currentRs * 3.0;                       // 最内稳定轨道 (9.0 * Mass)
    const G_const = 500.0 * state.mass;
    const spawnRadius = CONFIG.diskOuterBase * state.mass;
    const spawnZone = CONFIG.spawnZoneBase * state.mass;

    // --- 2. 核心修复：质量动态重映射 (防止 Mass 缩小后变暗) ---
    if (Math.abs(state.mass - state.prevMass) > 0.001) {
        const scaleFactor = state.mass / state.prevMass;
        const uData = system.geometry.userData;
        for (let j = 0; j < CONFIG.particleCount; j++) {
            uData.radii[j] *= scaleFactor;
            // 如果缩放后粒子掉进视界，强制设为极大值以触发均匀重生
            if (uData.radii[j] < currentRs * 1.0001) uData.radii[j] = 5000.0; 
        }
        state.prevMass = state.mass;
    }

    // --- 3. 更新着色器 Uniforms 与黑洞比例 ---
    state.lensingCurrent += (state.lensingTarget - state.lensingCurrent) * 0.1;
    system.material.uniforms.lensingStrength.value = state.lensingCurrent;
    system.material.uniforms.massScale.value = state.mass;
    blackHole.scale.setScalar(currentRs / 1.05);

    const pos = system.geometry.attributes.position.array;
    const alph = system.geometry.attributes.alpha.array;
    const uData = system.geometry.userData;

    // --- 4. 核心粒子循环 ---
    for (let i = 0; i < CONFIG.particleCount; i++) {
        const i3 = i * 3;
        let r = uData.radii[i];
        let phase = uData.phases[i];

        // --- A. 均匀平铺重生判定 ---
        const isConsumed = r < currentRs * 1.0001;
        const isEscaped = r > 2200.0 && !state.isExploding; // 爆发时不回收逃逸粒子

        if (isConsumed || isEscaped) {
            // 使用面积加权随机，确保盘面密度均匀
            const randomRatio = Math.sqrt(Math.random()); 
            r = currentRs + (spawnRadius + spawnZone - currentRs) * randomRatio;
            phase = Math.random() * Math.PI * 2;
            uData.yOffsets[i] = (Math.random() - 0.5) * (r * 0.04);
            alph[i] = 0.0; // 重生时全透明，产生渐现效果
        }

        // --- B. 物理动力学计算 ---
        // 引力时间膨胀因子 (dilation)
        let dilation = (r > currentRs) ? Math.sqrt(1.0 - (currentRs / r)) : 0.0;

        if (state.isExploding) {
            // 爆发模式：粒子受辐射压极速推开，无视时间膨胀
            const noise = Math.sin(i * 0.5 + clock.elapsedTime);
            r += (120.0 + noise * 60.0) * state.explosionFactor * delta;
        } else {
            // 视觉加速因子：让物理效果在视觉上更迅猛
            let visualBoost = 3.5; 
            let effectiveTime = simDelta * visualBoost;

            // 1. 旋转速度 (Keplerian + 1.2x 物理加成)
            let vOrbital = Math.sqrt(G_const / r) * 1.2; 
            // 即使在视界边缘也保留 0.15 的旋转底线，确保凝固感伴随旋转
            phase += vOrbital * Math.max(dilation, 0.15) * CONFIG.baseSpeed * uData.speeds[i] * effectiveTime * 0.2;

            // 2. 坠落速度 (vr)
            let vr = 0;
            if (r > isco) {
                // ISCO 外：稳态吸积
                vr = -5.0 * (state.mass / Math.sqrt(r)); 
            } else {
                // ISCO 内：自由俯冲 (Plunge Region)
                vr = -Math.sqrt(2.0 * G_const * (1.0/r - 1.0/isco)) - 150.0;
            }
            
            // 3. 核心物理：使用 dilation^2 模拟远方观察者看到的“速度冻结”
            r += vr * (dilation * dilation) * effectiveTime * uData.infallMod[i];
        }

        // --- C. 视觉呈现优化 ---
        let emiss = getEmissivity(r, isco);
        
        // 能量堆积因子：越靠近视界，物质密度感越高，亮度增强
        let energyStack = 1.0 / (dilation + 0.08); 
        let brightnessComp = 300.0 * (1.0 + Math.pow(state.mass, 0.75)); 
        let finalTarget = Math.min(emiss * energyStack * brightnessComp, 1.0);
        
        // 视界消隐：只在最贴近 Rs 的 1% 区域进行最后红移消失
        let horizonFade = THREE.MathUtils.smoothstep(r, currentRs * 1.0, currentRs * 1.01);
        
        // 执行淡入/淡出 (0.03 的速率保证物质流的连贯感)
        alph[i] = THREE.MathUtils.lerp(alph[i], finalTarget * horizonFade, 0.03);

        // --- D. 更新坐标缓冲区 ---
        pos[i3] = Math.cos(phase) * r;
        pos[i3+1] = uData.yOffsets[i];
        pos[i3+2] = Math.sin(phase) * r;

        uData.radii[i] = r;
        uData.phases[i] = phase;
    }

    // 5. 标记缓冲区更新
    system.geometry.attributes.position.needsUpdate = true;
    system.geometry.attributes.alpha.needsUpdate = true;
    
    // 6. 渲染场景
    renderer.render(scene, camera);
}

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

init();

</script>
