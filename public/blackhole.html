<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gargantua: Relativistic Infall (Lensing ON)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Three.js (r128) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- OrbitControls -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #000; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none; 
        }
        #canvas-container { 
            width: 100vw; 
            height: 100vh; 
            position: absolute; 
            top: 0; 
            left: 0; 
            z-index: 1; 
        }
        
        .cinematic-ui {
            position: absolute;
            z-index: 10;
            top: 0;
            left: 0;
            pointer-events: none; 
            color: rgba(255, 255, 255, 0.85);
            text-shadow: 0 0 15px rgba(255, 200, 100, 0.3);
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* 上下分布 */
            padding: 30px;
            box-sizing: border-box;
            background: radial-gradient(circle at center, transparent 30%, #000000 130%);
            overflow: hidden; 
        }

        /* --- Drawer UI Styling (修改版：左下角) --- */
        .ui-drawer {
            display: flex;
            align-items: flex-end; /* 改为底部对齐 */
            position: absolute;
            
            /* --- 关键修改：从 top 改为 bottom --- */
            top: auto; 
            bottom: 100px; /* 距离底部 100px，避开左下角的文字 */
            left: 0; 
            /* ---------------------------------- */

            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            pointer-events: auto;
            z-index: 50; 
        }

        .ui-drawer.closed {
            /* 向左收起 */
            transform: translateX(calc(-100% + 40px));
        }

        .ui-content-wrapper {
            background: rgba(10, 10, 10, 0.7);
            backdrop-filter: blur(10px);
            padding: 20px 20px 20px 30px; 
            border-radius: 0 2px 2px 0;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-left: none;
            width: 320px; 
        }

        .ui-toggle-arrow {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.6);
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-left: none;
            backdrop-filter: blur(5px);
            cursor: pointer;
            border-radius: 0 4px 4px 0;
            transition: background 0.3s;
            touch-action: none; 
            /* 让箭头垂直居中于抽屉 */
            align-self: center; 
        }
        .ui-toggle-arrow:active, .ui-toggle-arrow:hover {
            background: rgba(50, 50, 50, 1.0);
            color: #fff;
        }
        
        /* 箭头旋转逻辑 */
        .ui-drawer.closed .ui-toggle-arrow > span {
            transform: rotate(180deg);
        }
        .ui-toggle-arrow > span {
            display: block;
            transition: transform 0.3s;
        }
		
		.status-info-corner {
            position: absolute;
            bottom: 40px;
            right: 40px;
            text-align: right;
            pointer-events: none;
            z-index: 20;
        }

        .title {
            font-size: 12px;
            letter-spacing: 0.3em;
            font-weight: 600;
            border-left: 2px solid rgba(255, 255, 255, 0.5);
            padding-left: 10px;
            margin-bottom: 15px;
        }

        .control-group { margin-bottom: 20px; }
        .control-label { 
            font-size: 9px; 
            letter-spacing: 0.15em; 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 8px; 
            color: #ccc; 
            text-transform: uppercase;
        }
        
        input[type=range] {
            -webkit-appearance: none; width: 100%; background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 14px; width: 14px;
            border-radius: 50%; background: #ffffff;
            cursor: pointer; box-shadow: 0 0 10px rgba(255,255,255,0.8); margin-top: -6px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 2px; cursor: pointer; background: rgba(255,255,255,0.2);
        }

        /* Action Buttons */
        .action-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 16px; 
            font-size: 10px;
            letter-spacing: 0.2em;
            cursor: pointer;
            transition: all 0.1s;
            text-transform: uppercase;
            margin-right: 10px;
            margin-top: 10px;
            touch-action: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .action-btn:active { transform: scale(0.95); background: rgba(255, 255, 255, 0.3); }
        
        .btn-danger { border-color: rgba(255, 100, 100, 0.5); color: #ffcccc; }
        .btn-danger:active { background: rgba(200, 50, 50, 0.6); box-shadow: 0 0 15px rgba(255, 0, 0, 0.5); }

        /* Switch Style */
        .switch-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #888;
            width: 100%;
            padding: 8px;
            font-size: 10px;
            letter-spacing: 0.15em;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .switch-btn.active {
            background: rgba(255, 255, 255, 0.3);
            color: #fff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
            border-color: #fff;
        }

        .status-line { font-size: 9px; font-family: 'Courier New', monospace; opacity: 0.7; margin-top: 4px; }
        .blink { animation: blinker 0.2s linear infinite; color: #ff3333; font-weight: bold; }
        @keyframes blinker { 50% { opacity: 0.3; } }

        .hint-text {
            font-size: 9px;
            letter-spacing: 0.2em;
            opacity: 0.5;
            text-transform: uppercase;
            line-height: 1.6;
        }
        
        #freeze-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 16px; letter-spacing: 0.8em; color: #fff; opacity: 0;
            transition: opacity 0.3s; pointer-events: none;
            border-top: 1px solid white; border-bottom: 1px solid white; 
            padding: 15px 0; text-shadow: 0 0 20px white;
            z-index: 20;
        }

        #charge-bar-container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 240px; height: 2px; background: rgba(255,255,255,0.1);
            overflow: hidden; opacity: 0; transition: opacity 0.2s;
            pointer-events: none;
            z-index: 15;
        }
        #charge-bar {
            width: 0%; height: 100%; background: #fff; box-shadow: 0 0 15px #ffffff;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    <div id="freeze-overlay">SIMULATION PAUSED</div>

    <div class="cinematic-ui">
        <!-- 抽屉现在移动到了左下角 -->
        <div class="ui-drawer closed" id="ui-drawer">
            <!-- Content Wrapper -->
            <div class="ui-content-wrapper">
                <div class="title">EVENT HORIZON TELESCOPE</div>
                <div class="control-group">
                    <div class="control-label">
                        <span>Singularity Mass</span>
                        <span id="mass-display">1.0 M☉</span>
                    </div>
                    <input type="range" id="mass-slider" min="0.5" max="3.0" step="0.01" value="1.0">
                </div>

                <div class="control-group">
                    <div class="control-label">
                        <span>Temporal Flow</span>
                        <span id="speed-display">1.0x</span>
                    </div>
                    <input type="range" id="speed-slider" min="0.0" max="4.0" step="0.1" value="1.0">
                </div>

                <!-- Lensing Toggle (Default ON) -->
                <div class="control-group" style="margin-bottom: 0;">
                    <div class="control-label">
                        <span>Visual Distortion</span>
                        <span id="lensing-display" style="color: #fff;">ON</span>
                    </div>
                    <button id="lensing-toggle" class="switch-btn active">DISABLE LENSING</button>
                </div>
                
                <!-- Explicit Controls -->
                <div class="flex mt-4 pt-2 border-t border-white/10">
                    <button id="btn-freeze" class="action-btn">FREEZE</button>
                    <button id="btn-breach" class="action-btn btn-danger">BREACH</button>
                </div>

                <div class="mt-3 pt-3 border-t border-white/10">
                    <div class="status-line text-green-400" id="status-text">SYSTEM STABLE</div>
                    <div class="status-line">GYRO SENSOR: <span id="gyro-status">SEARCHING...</span></div>
                </div>
            </div>
            
            <!-- Toggle Arrow -->
            <div class="ui-toggle-arrow" id="ui-toggle-btn">
                <span>◀</span>
            </div>
        </div>
        
        <div class="status-info-corner">
            <div class="hint-text">
                MATTER COUNT: 300,000<br>
                PHYSICS: RELATIVISTIC LENSING & REDSHIFT<br>
                RESOLUTION: ULTRA-STABLE
            </div>
        </div>
    </div>
    <!-- SHADER: CORRECTED RELATIVISTIC VISUALIZATION -->
    <script type="x-shader/x-vertex" id="disk-vs">
        uniform float massScale;
        uniform float lensingStrength; // Controlled by UI Toggle
        
        attribute float size;
        attribute float alpha;
        attribute vec3 customColor;
        varying vec3 vColor;
        varying float vAlpha;
        
        void main() {
            // Standard View Position
            vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
            
            // --- 1. DOPPLER BEAMING ---
            vec3 velObj = normalize(vec3(-position.z, 0.0, position.x));
            vec3 velView = normalize(normalMatrix * velObj);
            vec3 viewDir = normalize(-mvPosition.xyz);
            float doppler = dot(velView, viewDir);
            float beaming = pow(1.0 + 0.6 * doppler, 2.0); 

            // --- 2. GRAVITATIONAL REDSHIFT ---
            float rsPhys = massScale * 3.0; 
            float rPhys = length(position.xyz);
            float gShift = sqrt(clamp(1.0 - (rsPhys / (rPhys + 0.01)), 0.0, 1.0));
            
            vec3 redshiftedColor = customColor;
            redshiftedColor.g *= smoothstep(0.0, 0.4, gShift);
            redshiftedColor.b *= smoothstep(0.0, 0.4, gShift);
            
            vec3 finalColor = redshiftedColor * beaming * gShift;
            vColor = finalColor;
            vAlpha = alpha;
            
            // --- 3. OPTIONAL GRAVITATIONAL LENSING (Toggleable) ---
            float r = length(mvPosition.xy);
            float rs = massScale * 12.0; 
            float rsSq = rs * rs;
            float rClamped = max(r, 0.1);
            float distortionFactor = (rsSq / rClamped) * lensingStrength;
            
            vec2 offset = normalize(mvPosition.xy) * distortionFactor;
            mvPosition.xy += offset;

            gl_Position = projectionMatrix * mvPosition;
            gl_PointSize = size * (900.0 / -mvPosition.z);
        }
    </script>

    <script type="x-shader/x-fragment" id="disk-fs">
        varying vec3 vColor;
        varying float vAlpha;
        
        void main() {
            vec2 center = gl_PointCoord - 0.5;
            float dist = length(center);
            if (dist > 0.5) discard;
            
            float strength = 1.0 - (dist * 2.0);
            strength = pow(strength, 2.5);

            gl_FragColor = vec4(vColor, vAlpha * strength);
        }
    </script>

<script>
/**
 * GARGANTUA: EINSTEIN LENSING V24 (Lensing Default ON)
 */

const CONFIG = {
    particleCount: 300000,
    horizonRadius: 3.0,     
    diskInner: 4.0,         
    diskOuterBase: 40.0,    
    spawnZoneBase: 20.0,    
    baseSpeed: 0.4,         
    infallRate: 20.0,       
    colVoid: new THREE.Color(0x000000),       
    colRedshift: new THREE.Color(0x220000),   
    colRedshiftMid: new THREE.Color(0xcc2200), 
    colAccretion: new THREE.Color(0xffaa33), 
    colBright: new THREE.Color(0xffffee),     
};

let scene, camera, renderer;
let system, blackHole, universeGroup;
let controls, clock;

let state = {
    mass: 1.0,  
    prevMass: 1.0,          
    simSpeed: 1.0,
    lensingTarget: 1.0, // DEFAULT ON
    lensingCurrent: 1.0, // DEFAULT ON
    isFrozen: false,
    isExploding: false,
    explosionFactor: 0.0,
    chargeLevel: 0.0,
    isCharging: false,
    gyro: { x: 0, y: 0 }
};

let chargeInterval = null;

function init() {
    const container = document.getElementById('canvas-container');

    scene = new THREE.Scene();
    universeGroup = new THREE.Group();
    scene.add(universeGroup);
    
    // Adjusted camera slightly to look down more, enhancing the spiral view
    camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 60, 200);

    renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x000000);
    container.appendChild(renderer.domElement);

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.rotateSpeed = 0.3;
    controls.enablePan = false;
    controls.minDistance = 10;
    controls.maxDistance = 800;

    createBlackHoleCore();
    createUnifiedSystem(); 

    window.addEventListener('resize', onWindowResize);
    setupInteractions();
    setupGyroscope();

    clock = new THREE.Clock();
    animate();
}

function createBlackHoleCore() {
    const geo = new THREE.SphereGeometry(2.95, 64, 64);
    const mat = new THREE.MeshBasicMaterial({ color: 0x000000 });
    blackHole = new THREE.Mesh(geo, mat);
    universeGroup.add(blackHole);
}

function createUnifiedSystem() {
    const positions = [];
    const colors = [];
    const sizes = [];
    const alphas = [];
    const phases = [];      
    const radii = [];        
    const yOffsets = [];     
    const speeds = [];       
    const originalY = [];    
    const targetAlpha = []; 
    const randomSeed = [];  
    const infallMod = [];    

    const maxInitRadius = CONFIG.diskOuterBase + CONFIG.spawnZoneBase;

    for (let i = 0; i < CONFIG.particleCount; i++) {
        const t = Math.random(); 
        const bias = Math.pow(t, 0.8); 
        
        const r = CONFIG.diskInner + (maxInitRadius - CONFIG.diskInner) * bias;
        const angle = Math.random() * Math.PI * 2;
        
        let thickness = 0.1 + (r * 0.02); 
        const spread = (Math.random() - 0.5) * thickness;
        const x = Math.cos(angle) * r;
        const z = Math.sin(angle) * r;
        const y = spread; 

        positions.push(x, y, z);
        colors.push(1, 0.6, 0.2); 
        sizes.push(Math.random() * 0.5 + 0.5); 
        alphas.push(0.0); 
        targetAlpha.push(Math.random() * 0.5 + 0.5); 

        phases.push(angle);
        radii.push(r);
        yOffsets.push(y);
        originalY.push(y);
        
        speeds.push(Math.random() * 0.2 + 0.9); 
        randomSeed.push(Math.random());
        infallMod.push(0.8 + Math.random() * 0.4);
    }

    const geometry = new THREE.BufferGeometry();
    geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    geometry.setAttribute('customColor', new THREE.Float32BufferAttribute(colors, 3));
    geometry.setAttribute('size', new THREE.Float32BufferAttribute(sizes, 1));
    geometry.setAttribute('alpha', new THREE.Float32BufferAttribute(alphas, 1));

    geometry.userData = { phases, radii, yOffsets, speeds, originalY, targetAlpha, randomSeed, infallMod };

    const material = new THREE.ShaderMaterial({
        uniforms: {
            massScale: { value: 1.0 },
            lensingStrength: { value: 1.0 } // Set Default to 1.0
        },
        vertexShader: document.getElementById('disk-vs').textContent,
        fragmentShader: document.getElementById('disk-fs').textContent,
        blending: THREE.AdditiveBlending,
        depthWrite: false, 
        transparent: true
    });

    system = new THREE.Points(geometry, material);
    universeGroup.add(system);
}

function setupGyroscope() {
    if (window.DeviceOrientationEvent && typeof window.DeviceOrientationEvent.requestPermission === 'function') {
        document.getElementById('gyro-status').innerText = "TAP TO ENABLE";
    }
    window.addEventListener('deviceorientation', (e) => {
        if (!e.beta && !e.gamma) return;
        const x = Math.max(-30, Math.min(30, e.beta || 0)); 
        const y = Math.max(-30, Math.min(30, e.gamma || 0)); 
        state.gyro.x = x * 0.02; 
        state.gyro.y = y * 0.02; 
        document.getElementById('gyro-status').innerText = "ACTIVE";
        document.getElementById('gyro-status').style.color = "#44ff44";
    });
}

function setupInteractions() {
    const canvas = renderer.domElement;
    
    // --- 1. DRAWER LOGIC ---
    const uiDrawer = document.getElementById('ui-drawer');
    const uiToggleBtn = document.getElementById('ui-toggle-btn');
    
    uiToggleBtn.addEventListener('click', (e) => {
        e.preventDefault(); e.stopPropagation();
        uiDrawer.classList.toggle('closed');
    });
    uiToggleBtn.addEventListener('touchend', (e) => {
        e.preventDefault(); e.stopPropagation();
        uiDrawer.classList.toggle('closed');
    });

    // --- 2. CONTROLS ---
    const massSlider = document.getElementById('mass-slider');
    const massDisplay = document.getElementById('mass-display');
    massSlider.addEventListener('input', (e) => {
        state.mass = parseFloat(e.target.value);
        massDisplay.innerText = state.mass.toFixed(2) + " M☉";
    });

    const speedSlider = document.getElementById('speed-slider');
    const speedDisplay = document.getElementById('speed-display');
    speedSlider.addEventListener('input', (e) => {
        state.simSpeed = parseFloat(e.target.value);
        speedDisplay.innerText = state.simSpeed.toFixed(1) + "x";
    });

    // --- LENSING TOGGLE (Logic Update for Default ON) ---
    const lensingToggle = document.getElementById('lensing-toggle');
    const lensingDisplay = document.getElementById('lensing-display');
    
    lensingToggle.addEventListener('click', (e) => {
        e.stopPropagation();
        if (state.lensingTarget === 0.0) {
            state.lensingTarget = 1.0;
            lensingToggle.innerText = "DISABLE LENSING";
            lensingToggle.classList.add('active');
            lensingDisplay.innerText = "ON";
            lensingDisplay.style.color = "#fff";
        } else {
            state.lensingTarget = 0.0;
            lensingToggle.innerText = "ENABLE LENSING";
            lensingToggle.classList.remove('active');
            lensingDisplay.innerText = "OFF";
            lensingDisplay.style.color = "#888";
        }
    });

    // --- 3. FREEZE BUTTON ---
    const btnFreeze = document.getElementById('btn-freeze');
    const freezeOverlay = document.getElementById('freeze-overlay');
    
    const toggleFreeze = () => {
        state.isFrozen = !state.isFrozen;
        freezeOverlay.style.opacity = state.isFrozen ? '1' : '0';
        btnFreeze.innerText = state.isFrozen ? "RESUME" : "FREEZE";
        btnFreeze.style.background = state.isFrozen ? "rgba(255, 255, 255, 0.4)" : "";
        if (navigator.vibrate) navigator.vibrate(20);
    };

    btnFreeze.addEventListener('click', (e) => { e.stopPropagation(); toggleFreeze(); });
    btnFreeze.addEventListener('dblclick', (e) => { e.stopPropagation(); });

    // --- 4. BREACH BUTTON ---
    const btnBreach = document.getElementById('btn-breach');
    const statusText = document.getElementById('status-text');

    const triggerExplosion = () => {
        if(state.isExploding) return;
        state.isExploding = true;
        statusText.innerText = "EVENT HORIZON BREACH";
        statusText.classList.remove('text-green-400');
        statusText.classList.add('blink');
        if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
    };

    const stopExplosion = () => {
        if (!state.isExploding) return;
        state.isExploding = false;
        statusText.innerText = "RESTORING ORBIT";
        statusText.classList.remove('blink');
        statusText.classList.add('text-yellow-400');
        setTimeout(() => {
            if(!state.isExploding) {
                 statusText.innerText = "SYSTEM STABLE";
                 statusText.classList.remove('text-yellow-400');
                 statusText.classList.add('text-green-400');
            }
        }, 2000);
        
        window.removeEventListener('mouseup', stopExplosion, true);
        window.removeEventListener('touchend', stopExplosion, true);
        window.removeEventListener('touchcancel', stopExplosion, true);
    };

    const onBreachStart = (e) => {
        e.preventDefault(); e.stopPropagation();
        triggerExplosion();
        window.addEventListener('mouseup', stopExplosion, true);
        window.addEventListener('touchend', stopExplosion, true);
        window.addEventListener('touchcancel', stopExplosion, true);
    };

    btnBreach.addEventListener('mousedown', onBreachStart);
    btnBreach.addEventListener('touchstart', onBreachStart, { passive: false });

    // --- 5. CANVAS INTERACTIONS ---
    let lastTapTime = 0;
    let touchStartX = 0;
    let touchStartY = 0;
    let isDragging = false;
    let lastTouchTime = 0; 
    
    const chargeBar = document.getElementById('charge-bar');
    const chargeBarContainer = document.getElementById('charge-bar-container');
    
    const startCanvasCharge = () => {
        if (state.isExploding) return;
        state.isCharging = true;
        state.chargeLevel = 0;
        chargeBarContainer.style.opacity = '1';
        
        if (chargeInterval) clearInterval(chargeInterval);
        chargeInterval = setInterval(() => {
            if (!state.isCharging) return;
            state.chargeLevel += 0.02; 
            chargeBar.style.width = Math.min(100, state.chargeLevel * 100) + "%";
            if (state.chargeLevel >= 1.0) {
                triggerExplosion();
                clearInterval(chargeInterval);
            }
        }, 20);
    };

    const stopCanvasCharge = () => {
        state.isCharging = false;
        clearInterval(chargeInterval);
        chargeBarContainer.style.opacity = '0';
        state.chargeLevel = 0;
        chargeBar.style.width = "0%";
        if (state.isExploding) stopExplosion(); 
    };

    canvas.addEventListener('touchstart', (e) => {
        if (e.touches.length > 1) return;
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
        isDragging = false;
        startCanvasCharge();
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
        const dx = e.touches[0].clientX - touchStartX;
        const dy = e.touches[0].clientY - touchStartY;
        if (Math.sqrt(dx*dx + dy*dy) > 30) isDragging = true;
    }, { passive: false });

    canvas.addEventListener('touchend', (e) => {
        lastTouchTime = new Date().getTime();
        stopCanvasCharge();
        if (isDragging) return;

        const currentTime = new Date().getTime();
        const tapLength = currentTime - lastTapTime;
        if (tapLength < 500 && tapLength > 0) {
            toggleFreeze();
            if(e.cancelable) e.preventDefault(); 
        } 
        lastTapTime = currentTime;
    });

    canvas.addEventListener('mousedown', startCanvasCharge);
    canvas.addEventListener('dblclick', (e) => {
        const now = new Date().getTime();
        if (now - lastTouchTime < 800) return;
        toggleFreeze();
    });
    window.addEventListener('mouseup', stopCanvasCharge);
}

function animate() {
    requestAnimationFrame(animate);

    const delta = clock.getDelta();
    controls.update();
    
    if (universeGroup) {
        universeGroup.rotation.x += (state.gyro.x - universeGroup.rotation.x) * 0.1;
        universeGroup.rotation.y += (state.gyro.y - universeGroup.rotation.y) * 0.1;
    }

    let baseDelta = state.isFrozen ? 0 : delta;
    let simDelta = baseDelta * state.simSpeed;
    
    if (state.isExploding) {
        state.explosionFactor += (1.0 - state.explosionFactor) * 0.05;
        simDelta = delta * state.simSpeed; 
    } else {
        state.explosionFactor += (0.0 - state.explosionFactor) * 0.08;
    }

    // Smooth Lensing Toggle
    state.lensingCurrent += (state.lensingTarget - state.lensingCurrent) * 0.1;
    system.material.uniforms.lensingStrength.value = state.lensingCurrent;
    system.material.uniforms.massScale.value = state.mass;

    if (Math.abs(state.mass - state.prevMass) > 0.0001) {
        const scaleFactor = state.mass / state.prevMass;
        state.prevMass = state.mass;
        const uData = system.geometry.userData;
        for (let i = 0; i < CONFIG.particleCount; i++) {
            uData.radii[i] *= scaleFactor;
            uData.yOffsets[i] *= Math.pow(scaleFactor, 0.5); 
            uData.originalY[i] *= Math.pow(scaleFactor, 0.5);
        }
    }

    const currentRs = CONFIG.horizonRadius * state.mass;
    blackHole.scale.setScalar(currentRs / 1.05); 
    
    const currentLimitOuter = CONFIG.diskOuterBase * state.mass;
    const currentSpawnZone = CONFIG.spawnZoneBase * state.mass;
    const G = 500.0 * state.mass; 

    const pos = system.geometry.attributes.position.array;
    const cols = system.geometry.attributes.customColor.array;
    const alph = system.geometry.attributes.alpha.array;
    const uData = system.geometry.userData;

    for (let i = 0; i < CONFIG.particleCount; i++) {
        const i3 = i * 3;
        let r = uData.radii[i];
        let phase = uData.phases[i];
        
        // --- RELATIVISTIC TIME DILATION ---
        let dilation = 1.0;
        if (r > currentRs) {
            dilation = Math.sqrt(1.0 - (currentRs / r));
        } else {
            dilation = 0.0; 
        }
        
        if (state.explosionFactor > 0.01) {
            const noise = Math.sin(i * 12.3 + clock.elapsedTime);
            r += (15.0 + noise * 10.0) * state.explosionFactor * delta * 2.0; 
            uData.yOffsets[i] += Math.cos(i) * state.explosionFactor * delta * 8.0;
        } else {
            // PHYSICS 1: Orbital Speed (Keplerian) increases with proximity
            let vOrbital = Math.sqrt(G / r);
            phase += (vOrbital * dilation * CONFIG.baseSpeed * uData.speeds[i] * simDelta * 0.2);
            
            // PHYSICS 2: Infall Speed (Viscosity + Gravity Plunge)
            let plungeRegion = currentRs * 3.0;
            let infallBase = CONFIG.infallRate / Math.sqrt(r);
            
            if (r < plungeRegion) {
                let plungeFactor = 1.0 + 2.0 * (1.0 - (r - currentRs) / (plungeRegion - currentRs));
                infallBase *= plungeFactor;
            }

            // Apply Time Dilation^2
            let infall = infallBase * (dilation * dilation) * simDelta * uData.infallMod[i];
            r -= infall;

            const isDead = r < currentRs * 1.01; 
            
            if (isDead) {
                r = currentLimitOuter + (Math.random() * currentSpawnZone);
                alph[i] = 0.0; 
                uData.yOffsets[i] = (Math.random() - 0.5) * (0.1 * state.mass + r * 0.02); 
                uData.originalY[i] = uData.yOffsets[i];
            }
            uData.yOffsets[i] += (uData.originalY[i] - uData.yOffsets[i]) * 0.05;
        }
        
        const c = new THREE.Color();
        c.set(CONFIG.colAccretion);

        if (r > currentLimitOuter) {
            let opacity = 1.0 - ((r - currentLimitOuter) / currentSpawnZone);
            opacity = Math.max(0, opacity);
            if (alph[i] < opacity) alph[i] += delta * 0.5;
            if (alph[i] > opacity) alph[i] = opacity;
        } else {
            if (alph[i] < uData.targetAlpha[i]) alph[i] += delta * 0.5;
        }
        
        if (state.explosionFactor > 0.1) {
            c.lerp(new THREE.Color(1, 1, 1), state.explosionFactor * 0.8);
            alph[i] = 1.0;
        }

        const x = Math.cos(phase) * r;
        const z = Math.sin(phase) * r;
        const y = uData.yOffsets[i]; 

        pos[i3] = x;
        pos[i3+1] = y;
        pos[i3+2] = z;
        
        cols[i3] = c.r;
        cols[i3+1] = c.g;
        cols[i3+2] = c.b;

        uData.radii[i] = r;
        uData.phases[i] = phase;
    }

    system.geometry.attributes.position.needsUpdate = true;
    system.geometry.attributes.customColor.needsUpdate = true;
    system.geometry.attributes.alpha.needsUpdate = true;
    
    renderer.render(scene, camera);
}

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

init();

</script>
